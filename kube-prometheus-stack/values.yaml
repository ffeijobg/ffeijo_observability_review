# Helm values for prometheus-community/kube-prometheus-stack.
# This is new: nothing in this repo previously stood up Prometheus/Grafana/
# Alertmanager themselves -- every other manifest here ("your existing
# Prometheus", "your existing Grafana") assumed a home-lab stack that was
# already running. On a fresh kind cluster nothing exists until this
# Application syncs, so it goes first (see the sync-wave annotation on
# argocd/apps/kube-prometheus-stack.yaml) -- the ServiceMonitor CRD
# (otel-collector/servicemonitor.yaml) and PrometheusRule CRD (generated by
# Sloth from slo/*.slo.yaml) both come from this chart.

grafana:
  # Fixed, not random-generated, so the training plan's curl/API validation
  # steps can use a real, stable value instead of a
  # `<your-grafana-password>` placeholder. Change this before exposing
  # Grafana beyond kubectl port-forward on a trusted host.
  adminPassword: "prom-operator"
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  # Grafana and this repo's datasource/dashboard ConfigMaps
  # (grafana/provisioning/) all live in the observability-platform
  # namespace, so the sidecar's default same-namespace search already finds
  # them -- no searchNamespace: ALL override needed.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    # No persistence -- lab-scale simplification matching Tempo/Loki's
    # documented "would move to durable/object storage in production" note
    # (docs/architecture.md). Data doesn't survive a pod restart.

alertmanager:
  # Mirrors slo/alertmanager-config.yaml -- kept as a separate, readable file
  # there for docs/the runbook to point at, but this is the copy that's
  # actually live: the Prometheus Operator's Alertmanager CRD reads its
  # config from here (chart-managed Secret), not from a hand-applied
  # ConfigMap. Editing this block and letting ArgoCD resync
  # (`argocd app sync kube-prometheus-stack`) is the only way a config
  # change here takes effect -- there's no separate StatefulSet to
  # `kubectl rollout restart` the way a hand-rolled Alertmanager would need.
  config:
    route:
      receiver: default-ticket
      routes:
        - matchers:
            - severity = "page"
          receiver: chat-webhook-urgent
          continue: false
        - matchers:
            - severity = "ticket"
          receiver: chat-webhook-ticket
          continue: false
    receivers:
      - name: default-ticket
        webhook_configs:
          - url: "https://REPLACE_ME.webhook.example/ticket"
      - name: chat-webhook-urgent
        webhook_configs:
          - url: "https://REPLACE_ME.webhook.example/urgent"
      - name: chat-webhook-ticket
        webhook_configs:
          - url: "https://REPLACE_ME.webhook.example/ticket"
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# This chart's own node-exporter/kube-state-metrics/etc. are left at
# defaults -- fine for a 3-node kind cluster on a single host.
