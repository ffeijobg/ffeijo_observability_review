[obs_hosts]
obs-node-1 ansible_connection=local

[obs_hosts:vars]
# Pinned explicitly, not auto-discovered: without this, Ansible probes the
# remote host and caches whatever python3 it finds first (e.g.
# /usr/bin/python3.13). That's a silent trap on a server you don't fully
# control -- installing a second Python later can shift which interpreter
# gets discovered on a future run, with no error, just different behavior.
# /usr/bin/python3 is the distro-maintained alternatives symlink present on
# every Debian release this playbook targets, so it stays correct as the
# server's own Python versions change underneath it.
ansible_python_interpreter=/usr/bin/python3
