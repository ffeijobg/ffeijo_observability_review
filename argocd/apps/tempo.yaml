apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/grafana/helm-charts.git
      targetRevision: tempo-1.10.1
      path: charts/tempo
      helm:
        valueFiles:
          - $values/tempo/values.yaml
    - repoURL: https://github.com/ffeijobg/ffeijo_observability_review.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
