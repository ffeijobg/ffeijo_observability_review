apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ffeijobg/ffeijo_observability_review.git
    targetRevision: main
    path: otel-collector
  destination:
    server: https://kubernetes.default.svc
    namespace: observability-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
