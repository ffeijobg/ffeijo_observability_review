# Plain kind cluster -- no GPU passthrough, no custom containerd runtime
# patches, no extraMounts. This workload is CPU-only, so none of the
# nested-container complexity a GPU cluster needs applies here: kind's
# default storage class (rancher.io/local-path) and default CNI (kindnet)
# are both fine as-is for Tempo/Loki/Prometheus persistence and pod-to-pod
# traffic.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: obs-platform

nodes:
  - role: control-plane
  - role: worker
  - role: worker
