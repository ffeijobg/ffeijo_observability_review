worker_processes  auto;
error_log         /tmp/nginx/error.log warn;
pid               /tmp/nginx/nginx.pid;   # MUST be in /tmp/nginx
 
events { worker_connections 1024; }
 
http {
    server_tokens off;   # Hides nginx version from response headers
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path       /tmp/nginx/proxy_temp;
    fastcgi_temp_path     /tmp/nginx/fastcgi_temp;
 
    server {
        listen      8080;   # High port — no CAP_NET_BIND_SERVICE
        root        /usr/share/nginx/html;
 
        # Security headers
        add_header X-Frame-Options        'SAMEORIGIN'  always;
        add_header X-Content-Type-Options 'nosniff'     always;
        add_header X-XSS-Protection       '1; mode=block' always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self';" always;
 
        location /api/ { proxy_pass http://backend-service:5000/; }
        location ~ /\. { deny all; return 404; }  # Block .git/.env
    }
}
